<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna Egypte - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="test.css">

</head>
<body style="background-image: url(css/images/6026022181139057916.jpg);
overflow: hidden; background-size: cover;">

    <div class="login-screen-area">
        
        <div class="login-card">
            <div class="card-header">
                <h1>Aeterna Egypte</h1>
                <p>Welcome back, explorer!</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" >
                </div>

                <button type="submit" class="submit-btn">Login to Portal</button>
            </form>

            <div class="card-footer">
                <a href="#">Forgot Password?</a>
                <span class="sep">|</span>
                <a href="#">Create Account</a>
            </div>
        </div>

    </div>


<script src="script.js"></script>

</body>
</html>
